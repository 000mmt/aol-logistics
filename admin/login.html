<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - AOL Logistics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
  <!-- Login Card -->
  <div class="w-full max-w-md bg-white shadow-xl rounded-lg p-8">
    <h1 class="text-2xl font-bold text-center text-yellow-500 mb-6">Admin Login</h1>
    <!-- Login Form -->
    <form id="adminLoginForm" class="space-y-4" aria-label="Admin Login Form">
      <div>
        <label for="email" class="block font-semibold text-gray-700">Email</label>
        <input type="email" id="email" placeholder="Enter Email" class="w-full mt-2 p-3 border rounded-lg focus:ring-2 focus:ring-yellow-500 focus:outline-none" required>
      </div>
      <div>
        <label for="password" class="block font-semibold text-gray-700">Password</label>
        <input type="password" id="password" placeholder="Enter password" class="w-full mt-2 p-3 border rounded-lg focus:ring-2 focus:ring-yellow-500 focus:outline-none" required>
      </div>
      <button type="submit" id="loginBtn" class="w-full bg-yellow-500 text-white py-3 rounded-lg font-semibold hover:bg-yellow-600 transition disabled:opacity-60 disabled:cursor-not-allowed">
        Login
      </button>
    </form>
    <!-- Message -->
    <div id="message" class="mt-4 text-center text-sm"></div>
  </div>

  <script>
  /* Wrapped in an IIFE so `supabase`, `form`, etc. live in their own function
     scope instead of the page's shared global scope. This is what fixes the
     "Identifier 'supabase' has already been declared" error — if this script
     block (or the SDK tag) ever ends up on the page more than once, the two
     copies can no longer collide with each other. If you still see that
     error after this change, check your actual served login.html for a
     duplicate <script src=".../supabase-js@2"> or duplicate inline script
     block (common if a build step or template include is inserting one). */
  (function () {
    const SUPABASE_URL = "https://rtgvylkbndrmwntaqkfx.supabase.co";
    const SUPABASE_KEY = "sb_publishable_SFI-gjeDtTrOGpLp1_BTtg_hXy6wPSB"; // Use environment variables in production
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Both login.html and the dashboard live in the same /admin folder,
    // so a plain relative filename is correct here.
    const DASHBOARD_URL = "dashboard.html";

    const form = document.getElementById("adminLoginForm");
    const loginBtn = document.getElementById("loginBtn");
    const messageDiv = document.getElementById("message");

    function escapeHtml(str = "") {
      return String(str).replace(/[&<>"']/g, m =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[m])
      );
    }

    function showMessage(html) {
      messageDiv.innerHTML = html;
    }

    // Best-effort login record for Settings > Security > Login Activity.
    // Fails silently if the login_activity table doesn't exist yet.
    async function recordLoginActivity(email) {
      try {
        let ip = "unknown", country = "unknown";
        try {
          const res = await fetch("https://ipapi.co/json/");
          const geo = await res.json();
          ip = geo.ip || "unknown";
          country = geo.country_name || "unknown";
        } catch (_) { /* geo lookup is best-effort only */ }

        await supabase.from("login_activity").insert([{
          user_email: email,
          ip_address: ip,
          country,
          browser: navigator.userAgent,
          created_at: new Date().toISOString()
        }]);
      } catch (e) {
        console.warn("login_activity insert skipped (table may not exist yet):", e);
      }
    }

    // If there's already a valid session, skip the form entirely.
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) window.location.href = DASHBOARD_URL;
    })();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      loginBtn.disabled = true;
      loginBtn.textContent = "Logging in…";
      showMessage("");

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showMessage(`<p class="text-red-600 font-semibold">❌ ${escapeHtml(error.message)}</p>`);
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
        return;
      }

      showMessage(`<p class="text-green-600 font-semibold">✅ Login successful! Redirecting...</p>`);
      await recordLoginActivity(data.user?.email || email);
      setTimeout(() => window.location.href = DASHBOARD_URL, 1200);
    });
  })();
  </script>
</body>
</html>
